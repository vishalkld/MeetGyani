<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEET GYANI – दैनिक ज्ञान</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Baloo+2:wght@600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#070B16;font-family:'Baloo 2',sans-serif;color:#F0F4FF;min-height:100vh;}
.header{text-align:center;padding:22px 16px 14px;background:linear-gradient(180deg,rgba(255,107,0,.15),transparent);}
.brand-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px;}
.logo-wrap{position:relative;width:76px;height:76px;flex-shrink:0;}
.logo-wrap::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(#FF6B00,#FFD700,#00D4B1,#FF6B00);animation:spin 4s linear infinite;}
.logo-wrap img{position:absolute;inset:3px;border-radius:50%;width:calc(100% - 6px);height:calc(100% - 6px);object-fit:cover;}
@keyframes spin{to{transform:rotate(360deg)}}
.brand-title{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,#FF6B00,#FFD700,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-sub{font-size:.76rem;color:#00D4B1;letter-spacing:2px;font-family:'Rajdhani',sans-serif;margin-top:3px;}
.yt-btn{display:inline-flex;align-items:center;gap:5px;margin-top:7px;background:rgba(255,0,0,.15);border:1px solid rgba(255,60,60,.4);border-radius:20px;padding:3px 13px;text-decoration:none;font-size:.74rem;color:#FF5555;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,#FF6B00,#FFD700,#FF6B00,transparent);margin:10px 0;}
.page-title{font-family:'Tiro Devanagari Hindi',serif;font-size:1.65rem;background:linear-gradient(135deg,#FFD700,#fff,#00D4B1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.meta{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 11px;font-size:.72rem;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;}
.b1{background:rgba(255,107,0,.15);border:1px solid rgba(255,107,0,.35);color:#FF6B00;}
.b2{background:rgba(0,212,177,.12);border:1px solid rgba(0,212,177,.3);color:#00D4B1;}
.b3{background:rgba(77,159,255,.12);border:1px solid rgba(77,159,255,.3);color:#4D9FFF;}
.controls{max-width:960px;margin:0 auto;padding:0 14px;}
.cat-row{display:flex;gap:7px;overflow-x:auto;padding:10px 0 6px;scrollbar-width:none;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-btn{white-space:nowrap;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:5px 14px;color:#7A85A0;font-family:'Baloo 2',sans-serif;font-size:.78rem;cursor:pointer;transition:.2s;flex-shrink:0;}
.cat-btn.active{background:linear-gradient(135deg,#FF6B00,#FF3D00);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(255,107,0,.4);}
.cat-btn:hover:not(.active){background:rgba(255,107,0,.15);color:#FF6B00;border-color:rgba(255,107,0,.3);}
.btn-row{display:flex;gap:10px;justify-content:center;margin:8px 0;}
.btn-main{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FF6B00,#FF3D00);color:#fff;border:none;border-radius:12px;padding:11px 24px;font-family:'Baloo 2',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,0,.4);transition:.2s;}
.btn-main:hover{transform:translateY(-2px);}
.btn-main:active{transform:scale(.97);}
.btn-auto{display:flex;align-items:center;gap:6px;background:rgba(0,212,177,.1);border:1.5px solid rgba(0,212,177,.35);color:#00D4B1;border-radius:12px;padding:11px 18px;font-family:'Baloo 2',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s;}
.btn-auto.on{background:rgba(0,212,177,.22);color:#fff;box-shadow:0 0 18px rgba(0,212,177,.4);}
.tbar-wrap{display:none;text-align:center;margin:4px auto 0;max-width:440px;}
.tbar{height:4px;background:rgba(0,212,177,.15);border-radius:3px;overflow:hidden;}
.tbar-fill{height:100%;background:linear-gradient(90deg,#00D4B1,#4D9FFF);transform-origin:left;transition:transform .15s linear;}
.tbar-txt{font-size:.7rem;color:#7A85A0;margin-top:3px;font-family:'Rajdhani',sans-serif;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;max-width:960px;margin:14px auto 70px;padding:0 14px;}
.empty-msg{grid-column:1/-1;text-align:center;padding:50px 20px;color:#7A85A0;}
.empty-msg div:first-child{font-size:3rem;margin-bottom:12px;}
.empty-msg p{font-family:'Tiro Devanagari Hindi',serif;font-size:1.05rem;}

/* CARD */
.card{border-radius:16px;overflow:hidden;background:#141928;border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 18px rgba(0,0,0,.4);animation:cin .4s ease both;}
@keyframes cin{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
/* screenshot target - everything above share bar */
.card-snap{background:#141928;}
.cimg{position:relative;height:185px;overflow:hidden;}
.cbg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .5s;}
.card:hover .cbg{transform:scale(1.05);}
.cov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,11,22,.1),rgba(7,11,22,.92));}
.ctag{position:absolute;top:9px;left:9px;z-index:2;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:.68rem;font-weight:700;font-family:'Rajdhani',sans-serif;color:#fff;}
.cwm{position:absolute;top:9px;right:9px;z-index:2;width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,215,0,.9);object-fit:cover;}
.cnum{position:absolute;bottom:42px;right:9px;z-index:2;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#FF6B00,#FFD700);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.65rem;color:#070B16;}
.ctxt{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:11px 13px;}
.clbl{font-size:.58rem;font-family:'Rajdhani',sans-serif;letter-spacing:2px;text-transform:uppercase;color:#FFD700;margin-bottom:3px;}
.ch{font-family:'Tiro Devanagari Hindi',serif;font-size:.9rem;line-height:1.5;color:#fff;}
.cbody{padding:12px 13px 10px;}
.cd{font-size:.79rem;color:#7A85A0;line-height:1.7;}
.cw{margin-top:8px;padding:6px 10px;background:rgba(0,212,177,.07);border-left:3px solid #00D4B1;border-radius:0 6px 6px 0;font-size:.7rem;color:#00D4B1;font-family:'Rajdhani',sans-serif;}
.cstrip{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;border-top:1px solid rgba(255,255,255,.06);background:rgba(255,107,0,.05);}
.cstrip-l{display:flex;align-items:center;gap:7px;}
.cstrip img{width:20px;height:20px;border-radius:50%;border:1.5px solid #FFD700;object-fit:cover;}
.cstrip-name{font-family:'Rajdhani',sans-serif;font-size:.74rem;font-weight:700;color:#FF6B00;letter-spacing:1px;}
.cstrip-yt{font-size:.6rem;color:#7A85A0;font-family:'Rajdhani',sans-serif;}
.cstrip-tag{font-size:.64rem;color:#FF6B00;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}

/* SHARE BAR - not part of screenshot */
.sbar{display:flex;border-top:1px solid rgba(255,255,255,.07);}
.sbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:9px 3px;border:none;background:#1C2438;color:#7A85A0;font-family:'Baloo 2',sans-serif;font-size:.6rem;font-weight:700;cursor:pointer;transition:.18s;border-right:1px solid rgba(255,255,255,.06);}
.sbtn:last-child{border-right:none;}
.sbtn .si{font-size:1.1rem;line-height:1;}
.sbtn:hover{color:#fff;}
.s-dl:hover{background:rgba(255,107,0,.18);color:#FF6B00;}
.s-wa:hover{background:rgba(37,211,102,.12);color:#25D366;}
.s-sh:hover{background:rgba(0,212,177,.1);color:#00D4B1;}
.s-tw:hover{background:rgba(29,161,242,.1);color:#1DA1F2;}
.s-cp:hover{background:rgba(255,215,0,.1);color:#FFD700;}
.sbtn:active{transform:scale(.94);}

/* overlays */
.ov{display:none;position:fixed;inset:0;z-index:99;background:rgba(7,11,22,.92);backdrop-filter:blur(10px);align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.ov.show{display:flex;}
.spinner{width:52px;height:52px;border:4px solid rgba(255,107,0,.15);border-top-color:#FF6B00;border-radius:50%;animation:spin .7s linear infinite;}
.ov-txt{font-family:'Tiro Devanagari Hindi',serif;font-size:1rem;color:#F0F4FF;}
.dots{display:flex;gap:6px;margin-top:2px;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,107,0,.3);animation:db 1.1s ease infinite;}
.dot:nth-child(2){animation-delay:.18s;}.dot:nth-child(3){animation-delay:.36s;}
@keyframes db{0%,100%{transform:translateY(0);background:rgba(255,107,0,.3)}50%{transform:translateY(-7px);background:#FF6B00}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:#1C2438;border:1px solid #FF6B00;border-radius:11px;padding:9px 20px;font-size:.84rem;color:#fff;z-index:200;opacity:0;transition:.25s;font-family:'Baloo 2',sans-serif;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
@media(max-width:500px){
  .brand-title{font-size:1.55rem;}
  .page-title{font-size:1.3rem;}
  .grid{grid-template-columns:1fr;}
  .logo-wrap{width:62px;height:62px;}
}
</style>
</head>

// === STATE ===
var selCat = 'all';
var shown  = [];
var total  = 0;
var autoOn = false;
var tInt   = null;

// === CATEGORY FILTER — fixed ===
document.getElementById('cats').addEventListener('click', function(e) {
  var b = e.target.closest('.cat-btn');
  if (!b) return;
  // update active style
  document.querySelectorAll('.cat-btn').forEach(function(x){ x.classList.remove('active'); });
  b.classList.add('active');
  // update selected category
  selCat = b.getAttribute('data-k');
  // auto-generate facts for new category
  gen();
});

// === SHUFFLE ===
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// === GENERATE ===
function gen() {
  // filter by category
  var pool = (selCat === 'all') ? DB : DB.filter(function(f){ return f.k === selCat; });

  if (!pool.length) {
    showToast('इस category में facts नहीं हैं!');
    return;
  }

  // find unseen facts; reset if all seen
  var avail = pool.filter(function(f){ return shown.indexOf(f.h) < 0; });
  if (avail.length < 1) {
    // reset only this category's shown
    pool.forEach(function(f){ var i = shown.indexOf(f.h); if(i > -1) shown.splice(i,1); });
    avail = pool.slice();
  }

  var picked = shuffle(avail).slice(0, Math.min(6, avail.length));
  picked.forEach(function(f){ shown.push(f.h); });

  // show loader
  var ldr = document.getElementById('ldr');
  ldr.classList.add('show');
  var msgs = ['🤖 AI तथ्य खोज रहा है...', '📚 ज्ञान भंडार से चुन रहे हैं...', '✨ आपके लिए तैयार!'];
  var mi = 0;
  var lt = setInterval(function(){ document.getElementById('ldrTxt').textContent = msgs[mi++ % msgs.length]; }, 500);

  setTimeout(function() {
    clearInterval(lt);
    ldr.classList.remove('show');
    drawCards(picked);
  }, 1200 + Math.random() * 400);
}

// === DRAW CARDS ===
function drawCards(list) {
  var g = document.getElementById('grid');
  g.innerHTML = '';
  total += list.length;
  document.getElementById('cnt').textContent = total;

  list.forEach(function(f, i) {
    var bg  = BG[f.k] || BG.science;
    var num = total - list.length + i + 1;
    var txt = f.h + '\n\n' + f.d + '\n\n' + '💡 ' + f.w + '\n\n📺 MEET GYANI | youtube.com/@meetgyani';

    var card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.08) + 's';

    // card-snap = everything except share bar (this gets screenshotted)
    card.innerHTML =
      '<div class="card-snap">' +
        '<div class="cimg">' +
          '<div class="cbg" style="background-image:url(\'' + bg + '\')"></div>' +
          '<div class="cov"></div>' +
          '<div class="ctag">' + f.e + ' ' + f.c + '</div>' +
          '<img class="cwm" src="' + LOGO_SRC + '" alt="">' +
          '<div class="cnum">' + num + '</div>' +
          '<div class="ctxt">' +
            '<div class="clbl">✦ MEET GYANI – आज का तथ्य</div>' +
            '<div class="ch">' + f.h + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cbody">' +
          '<div class="cd">' + f.d + '</div>' +
          (f.w ? '<div class="cw">💡 ' + f.w + '</div>' : '') +
          '<div class="cstrip">' +
            '<div class="cstrip-l">' +
              '<img src="' + LOGO_SRC + '" alt="">' +
              '<div><div class="cstrip-name">MEET GYANI</div><div class="cstrip-yt">youtube.com/@meetgyani</div></div>' +
            '</div>' +
            '<div class="cstrip-tag">⚡ Power of Knowledge</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="sbar">' +
        '<button class="sbtn s-dl"><span class="si">📥</span>Save</button>' +
        '<button class="sbtn s-wa"><span class="si">💬</span>WhatsApp</button>' +
        '<button class="sbtn s-sh"><span class="si">📤</span>Share</button>' +
        '<button class="sbtn s-tw"><span class="si">🐦</span>Tweet</button>' +
        '<button class="sbtn s-cp"><span class="si">📋</span>Copy</button>' +
      '</div>';

    var snap  = card.querySelector('.card-snap');
    var sbar  = card.querySelector('.sbar');
    var btns  = card.querySelectorAll('.sbtn');
    var fact  = f;
    var shareText = txt;

    // Save image
    btns[0].onclick = function() {
      makeImg(snap, sbar, fact, function(url) {
        var a = document.createElement('a');
        a.href = url; a.download = 'MeetGyani_Fact.png'; a.click();
        showToast('✅ Image gallery में save हो गई!');
      });
    };
    // WhatsApp
    btns[1].onclick = function() {
      makeImg(snap, sbar, fact, function(url, blob) {
        doShare(blob, url, shareText, 'wa');
      });
    };
    // Native share
    btns[2].onclick = function() {
      makeImg(snap, sbar, fact, function(url, blob) {
        doShare(blob, url, shareText, 'share');
      });
    };
    // Twitter
    btns[3].onclick = function() {
      window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(fact.h + ' #MeetGyani #DailyFacts'), '_blank');
    };
    // Copy
    btns[4].onclick = function() {
      try {
        navigator.clipboard.writeText(shareText).then(function(){ showToast('✅ Text copy हो गया!'); });
      } catch(e) {
        var ta = document.createElement('textarea');
        ta.value = shareText; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast('✅ Copy हो गया!');
      }
    };

    g.appendChild(card);
  });
}

// === HIGH QUALITY IMAGE MAKER ===
// Uses 3x scale for sharp output — card-snap element only, share bar excluded
function makeImg(snapEl, sbarEl, fact, cb) {
  document.getElementById('sProg').classList.add('show');

  // render at 3× for crisp quality
  var SCALE = 3;
  var W = snapEl.offsetWidth * SCALE;

  // temporarily freeze sbar so it's invisible but doesn't collapse layout
  sbarEl.style.visibility = 'hidden';

  // compute rendered height of snap element
  var H = snapEl.offsetHeight * SCALE;

  var canvas = document.createElement('canvas');
  canvas.width  = W;
  canvas.height = H;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  var bgUrl = fact ? (BG[fact.k] || BG.science) : BG.science;

  function done() {
    sbarEl.style.visibility = '';
    document.getElementById('sProg').classList.remove('show');
    var url = canvas.toDataURL('image/png');
    canvas.toBlob(function(blob) { cb(url, blob); }, 'image/png');
  }

  function drawAll(bgImg) {
    var SW = snapEl.offsetWidth;  // logical width
    var SH = snapEl.offsetHeight; // logical height
    var IMG_H = 185;              // image section height

    // ── background ──
    ctx.fillStyle = '#141928';
    ctx.fillRect(0, 0, SW, SH);

    // ── bg photo ──
    if (bgImg) {
      ctx.save();
      ctx.globalAlpha = 0.55;
      var sc = Math.max(SW / bgImg.width, IMG_H / bgImg.height);
      var dW = bgImg.width * sc, dH = bgImg.height * sc;
      ctx.drawImage(bgImg, (SW - dW) / 2, (IMG_H - dH) / 2, dW, dH);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // ── gradient overlay on photo ──
    var ov = ctx.createLinearGradient(0, 0, 0, IMG_H);
    ov.addColorStop(0, 'rgba(7,11,22,0.08)');
    ov.addColorStop(1, 'rgba(7,11,22,0.93)');
    ctx.fillStyle = ov;
    ctx.fillRect(0, 0, SW, IMG_H);

    // ── category pill ──
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    roundRect(ctx, 9, 9, 130, 24, 12); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillText(fact.e + ' ' + fact.c, 18, 25);

    // ── watermark logo top-right ──
    if (logoImg) {
      ctx.save();
      ctx.beginPath(); ctx.arc(SW - 24, 24, 16, 0, Math.PI * 2); ctx.clip();
      ctx.drawImage(logoImg, SW - 40, 8, 32, 32);
      ctx.restore();
      ctx.strokeStyle = 'rgba(255,215,0,0.9)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(SW - 24, 24, 16, 0, Math.PI * 2); ctx.stroke();
    }

    // ── MEET GYANI label ──
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 9px Rajdhani,sans-serif';
    ctx.fillText('✦ MEET GYANI – आज का तथ्य', 12, IMG_H - 46);

    // ── headline ──
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 16px serif';
    wrapText(ctx, fact.h, 12, IMG_H - 26, SW - 18, 20);

    // ── body section background ──
    ctx.fillStyle = '#141928';
    ctx.fillRect(0, IMG_H, SW, SH - IMG_H);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(0, IMG_H, SW, 1);

    // ── detail text ──
    ctx.fillStyle = '#7A85A0';
    ctx.font = '13px sans-serif';
    var dy = wrapText(ctx, fact.d, 13, IMG_H + 20, SW - 26, 18);

    // ── wow box ──
    if (fact.w) {
      dy += 6;
      ctx.fillStyle = 'rgba(0,212,177,0.07)';
      ctx.fillRect(13, dy, SW - 26, 32);
      ctx.fillStyle = '#00D4B1';
      ctx.fillRect(13, dy, 3, 32);
      ctx.font = '12px Rajdhani,sans-serif';
      ctx.fillText('💡 ' + fact.w, 22, dy + 20);
      dy += 38;
    }

    // ── brand strip ──
    var SY = SH - 48;
    ctx.fillStyle = 'rgba(255,107,0,0.06)';
    ctx.fillRect(0, SY, SW, 48);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(0, SY, SW, 1);

    if (logoImg) {
      ctx.save();
      ctx.beginPath(); ctx.arc(28, SY + 24, 15, 0, Math.PI * 2); ctx.clip();
      ctx.drawImage(logoImg, 13, SY + 9, 30, 30);
      ctx.restore();
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(28, SY + 24, 15, 0, Math.PI * 2); ctx.stroke();
    }

    ctx.fillStyle = '#FF6B00';
    ctx.font = 'bold 13px Rajdhani,sans-serif';
    ctx.fillText('MEET GYANI', 50, SY + 20);
    ctx.fillStyle = '#7A85A0';
    ctx.font = '10px Rajdhani,sans-serif';
    ctx.fillText('youtube.com/@meetgyani', 50, SY + 34);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FF6B00';
    ctx.font = 'bold 11px Rajdhani,sans-serif';
    ctx.fillText('⚡ Power of Knowledge', SW - 10, SY + 26);
    ctx.textAlign = 'left';

    done();
  }

  // helpers
  function roundRect(c, x, y, w, h, r) {
    c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y);
    c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r);
    c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h);
    c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r);
    c.quadraticCurveTo(x,y,x+r,y); c.closePath();
  }
  function wrapText(c, text, x, y, maxW, lh) {
    var words = text.split(' '), line = '';
    for (var i = 0; i < words.length; i++) {
      var t = line + words[i] + ' ';
      if (c.measureText(t).width > maxW && i > 0) { c.fillText(line, x, y); line = words[i] + ' '; y += lh; }
      else line = t;
    }
    c.fillText(line, x, y);
    return y + lh;
  }

  // load logo + bg image in parallel
  var logoImg = null, loaded = 0;
  function check() { if (++loaded === 2) drawAll(bgImgEl); }

  var li = new Image();
  li.onload = function() { logoImg = li; check(); };
  li.onerror = check;
  li.src = LOGO_SRC;

  var bgImgEl = new Image();
  bgImgEl.crossOrigin = 'anonymous';
  bgImgEl.onload = check;
  bgImgEl.onerror = function() { bgImgEl = null; check(); };
  bgImgEl.src = bgUrl;
}

// === SHARE DISPATCHER ===
function doShare(blob, url, text, mode) {
  var file = blob ? new File([blob], 'MeetGyani.png', {type:'image/png'}) : null;
  if (mode === 'wa') {
    if (file && navigator.share && navigator.canShare({files:[file]})) {
      navigator.share({files:[file], title:'MEET GYANI'}).catch(function() {
        window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
      });
    } else {
      // download image + open WA text
      var a = document.createElement('a'); a.href = url; a.download = 'MeetGyani.png'; a.click();
      setTimeout(function(){ window.open('https://wa.me/?text=' + encodeURIComponent(text.split('\n')[0] + '\n\n📺 MEET GYANI\nyoutube.com/@meetgyani'), '_blank'); }, 600);
      showToast('✅ Image save karo, phir WA par share karo!');
    }
  } else {
    if (file && navigator.share && navigator.canShare({files:[file]})) {
      navigator.share({files:[file], title:'MEET GYANI – Daily Fact', text:text.split('\n')[0]})
        .then(function(){ showToast('✅ Share ho gaya!'); })
        .catch(function(){ var a = document.createElement('a'); a.href=url; a.download='MeetGyani.png'; a.click(); showToast('✅ Image save karo!'); });
    } else if (navigator.share) {
      navigator.share({title:'MEET GYANI', text:text}).catch(function(){});
    } else {
      var a = document.createElement('a'); a.href=url; a.download='MeetGyani.png'; a.click();
      showToast('✅ Image save karo aur share karo!');
    }
  }
}

// === AUTO MODE ===
function toggleAuto() {
  autoOn = !autoOn;
  var btn = document.getElementById('autoBtn');
  var tw  = document.getElementById('tbarWrap');
  if (autoOn) {
    btn.textContent = '⏱ Auto: ON'; btn.classList.add('on');
    tw.style.display = 'block';
    showToast('✅ Auto ON — har 25s mein naye facts!');
    runTimer();
  } else {
    btn.textContent = '⏱ Auto: OFF'; btn.classList.remove('on');
    tw.style.display = 'none';
    clearInterval(tInt);
    showToast('⏹ Auto band.');
  }
}
function runTimer() {
  if (!autoOn) return;
  var e = 0;
  var fill = document.getElementById('tbarFill');
  var txt  = document.getElementById('tbarTxt');
  fill.style.transform = 'scaleX(1)';
  clearInterval(tInt);
  tInt = setInterval(function() {
    e += 200;
    var r = Math.max(0, 25 - e / 1000);
    fill.style.transform = 'scaleX(' + (r / 25) + ')';
    txt.textContent = Math.ceil(r) + 's mein naye facts...';
    if (e >= 25000) { clearInterval(tInt); gen(); setTimeout(function(){ if(autoOn) runTimer(); }, 2000); }
  }, 200);
}

// === TOAST ===
var tT;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tT);
  tT = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

// === START ===
window.onload = function() { gen(); };
</script>
